<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculadora">
        <input type="text" id="visor" disabled>

        <div class="botoes">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operador">÷</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operador">×</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operador">-</button>

            <button>0</button>
            <button class="limpar">C</button>
            <button class="apagar">⌫</button>
            <button class="igual">=</button>

            <button class="operador">+</button>
            <button class="operador">%</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
